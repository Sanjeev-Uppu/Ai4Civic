# ===========================
# Server Configuration
# ===========================
server.port=${PORT:8080}
spring.application.name=Ai4Civic

# ===========================
# Database (PostgreSQL)
# ===========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================
# Actuator
# ===========================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ===========================
# File Upload Directory
# ===========================
app.storage.upload-dir=uploads

# ===========================
# Email Configuration
# ===========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===========================
# Receiver Email
# ===========================
app.mail.collector=${MAIL_COLLECTOR}

# ===========================
# Gemini API
# ===========================
gemini.api.key=${GEMINI_API_KEY}
spring.ai.google.chat.options.model=gemini-2.5-flash

spring.ai.openai.temperature=0.7
spring.ai.openai.max-tokens=700

# ===========================
# File Upload Limits
# ===========================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB